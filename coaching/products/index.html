<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coaching Products</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f1713;
      color: #eef5ef;
    }
    .loading, .error {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      line-height: 1.7;
    }
    a { color: #b9d8bf; }
  </style>
</head>
<body>
  <div class="loading" id="status">טוען את עמוד המוצרים...</div>
  <script>
    (async function () {
      try {
        const res = await fetch('/pages/coaching/products/toc-index.md', { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to fetch source file: ' + res.status);
        const text = await res.text();
        const doctypeIndex = text.indexOf('<!DOCTYPE html>');
        const htmlIndex = text.indexOf('<html');
        const start = doctypeIndex >= 0 ? doctypeIndex : htmlIndex;
        if (start < 0) throw new Error('No HTML markup was found inside pages/coaching/products/toc-index.md');
        const html = text.slice(start);
        document.open();
        document.write(html);
        document.close();
      } catch (err) {
        document.body.innerHTML = '<div class="error">לא הצלחתי לטעון את התוכן מתוך <code>/pages/coaching/products/toc-index.md</code>.<br><br><a href="/pages/coaching/products/toc-index.md">לפתיחת קובץ המקור</a><br><br>' + String(err.message || err) + '</div>';
      }
    })();
  </script>
</body>
</html>
