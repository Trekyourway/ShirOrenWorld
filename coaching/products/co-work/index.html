<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Co-Work | קואוצ'ינג</title>
  <meta name="description" content="עמוד מוצר Co-Work עם התוכן והעיצוב המקורי." />
  <link rel="canonical" href="https://shir-oren.vercel.app/coaching/products/co-work/" />
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0f1713; color: #eef5ef; }
    .loading, .error { min-height: 100vh; display: grid; place-items: center; padding: 24px; text-align: center; line-height: 1.7; }
    a { color: #b9d8bf; }
  </style>
</head>
<body>
  <div class="loading">טוען את עמוד Co-Work...</div>
  <script>
    (async function () {
      try {
        const res = await fetch('/pages/coaching/products/co-work/index.html', { cache: 'no-store' });
        if (!res.ok) throw new Error('Failed to fetch source file: ' + res.status);
        const text = await res.text();
        const start = text.indexOf('<!DOCTYPE html>');
        if (start < 0) throw new Error('No HTML markup was found inside pages/coaching/products/co-work/index.html');
        document.open();
        document.write(text.slice(start));
        document.close();
      } catch (err) {
        document.body.innerHTML = '<div class="error">לא הצלחתי לטעון את עמוד Co-Work.<br><br><a href="/pages/coaching/products/co-work/index.html">לפתיחת קובץ המקור</a><br><br>' + String(err.message || err) + '</div>';
      }
    })();
  </script>
</body>
</html>
